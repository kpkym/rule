name: Purge jsDelivr

on:
  push:
    branches: [main]
    paths:
      - 'c/**'
      - 's/**'

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Purge changed files
        run: |
          files=$(git diff --name-only HEAD^ HEAD | grep -E '^(c|s)/' || true)
          for f in $files; do
            [ -f "$f" ] || continue
            url="https://purge.jsdelivr.net/gh/${GITHUB_REPOSITORY}@main/$f"
            echo "Purging $url"
            curl -sS "$url" -o /dev/null -w "%{http_code}\n"
          done
